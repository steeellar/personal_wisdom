<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人知识库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <script>
        // 配置 PDF.js worker
        document.addEventListener('DOMContentLoaded', () => {
            window.pdfjsLib = window['pdfjs-dist/build/pdf'];
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script type="module" src="prompts.js"></script>
    <script type="module" src="renderer.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
    <!-- 选中文本提问悬浮按钮 -->
    <button id="ask-selection" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition text-sm hidden flex items-center gap-2" title="对选中文本提问">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>
        选中文本提问
    </button>

    <!-- 顶部工具栏 -->
    <header class="bg-white border-b border-gray-200 px-4 py-2 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-semibold text-gray-800">个人知识库</h1>
            <!-- 模式切换器 -->
            <div class="flex items-center gap-2 bg-gray-100 rounded-lg p-1">
                <button id="mode-single" class="mode-btn flex items-center gap-1.5 px-3 py-1 rounded-md text-sm font-medium transition bg-white text-blue-600 shadow-sm" data-mode="single">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 01 2-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    单文档
                </button>
                <button id="mode-knowledge" class="mode-btn flex items-center gap-1.5 px-3 py-1 rounded-md text-sm font-medium transition text-gray-500 hover:text-gray-700" data-mode="knowledge">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                    </svg>
                    知识库
                </button>
            </div>
            <!-- 知识库状态指示器 -->
            <div id="knowledge-status" class="hidden flex items-center gap-2 px-3 py-1.5 bg-green-50 text-green-600 rounded-lg text-xs">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span id="knowledge-doc-count">0 份文档</span>
            </div>
            <!-- 构建索引按钮 -->
            <button id="build-index-btn" class="hidden flex items-center gap-1.5 px-3 py-1.5 bg-purple-50 text-purple-600 rounded-lg hover:bg-purple-100 transition text-sm">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582 4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/>
                </svg>
                构建索引
            </button>
            <!-- 索引状态指示器 -->
            <div id="index-status" class="hidden flex items-center gap-2 px-3 py-1.5 bg-amber-50 text-amber-600 rounded-lg text-xs">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M5 11h6a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2z"/>
                </svg>
                <span id="index-doc-count">已索引</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button id="settings-btn" class="p-1.5 hover:bg-gray-100 rounded" title="设置">
                <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </button>
            <div id="page-info" class="text-sm text-gray-500 hidden">- / -</div>
            <div class="flex items-center gap-2">
                <button id="zoom-out" class="p-1.5 hover:bg-gray-100 rounded hidden" title="缩小">
                    <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/>
                    </svg>
                </button>
                <span id="zoom-level" class="text-sm text-gray-600 w-12 text-center hidden">100%</span>
                <button id="zoom-in" class="p-1.5 hover:bg-gray-100 rounded hidden" title="放大">
                    <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <div class="flex-1 flex overflow-hidden">
        <!-- 左侧文件树 -->
        <div class="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0">
            <div class="p-3 border-b border-gray-200">
                <h2 class="text-sm font-medium text-gray-700">文件列表</h2>
            </div>
            <div id="file-tree" class="file-tree flex-1 p-2">
                <div class="empty-files">
                    <svg class="w-12 h-12 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                    </svg>
                    <p class="text-sm">请在设置里配置知识库文件夹路径</p>
                </div>
            </div>
        </div>

        <!-- 中间文档显示区 -->
        <div id="doc-content" class="flex-1 bg-gray-50">
            <!-- 欢迎页面 -->
            <div id="welcome-zone" class="flex items-center justify-center h-full">
                <div class="text-center text-gray-400">
                    <svg class="w-24 h-24 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 01 2-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <p class="text-lg mb-2">选择文件夹开始阅读</p>
                    <p class="text-sm">支持 PDF、DOCX、MD 等文档格式</p>
                </div>
            </div>

            <!-- PDF 容器 -->
            <div id="pdf-container" class="hidden p-4"></div>

            <!-- Markdown 容器 -->
            <div id="markdown-container" class="hidden"></div>

            <!-- DOCX 容器 -->
            <div id="docx-container" class="hidden"></div>
        </div>

        <!-- 右侧问答区 -->
        <div class="w-96 flex flex-col bg-white">
            <!-- 聊天记录 -->
            <div id="chat-messages" class="flex-1 p-4 space-y-3">
                <div class="text-center text-gray-400 text-sm py-8">
                    <svg class="w-12 h-12 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                    </svg>
                    <p>上传 PDF 后可以向 Kimi 提问</p>
                    <p class="text-xs mt-1">AI 将基于文档内容回答</p>
                </div>
            </div>

            <!-- 输入框 -->
            <div class="p-3 border-t border-gray-200">
                <div class="flex gap-2">
                    <textarea id="chat-input" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500" rows="2" placeholder="输入问题..." disabled></textarea>
                    <button id="send-btn" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                        </svg>
                    </button>
                </div>
                <div class="flex items-center justify-between mt-2">
                    <label class="flex items-center gap-2 text-xs text-gray-500 cursor-pointer">
                        <input type="checkbox" id="auto-extract" class="rounded" checked>
                        自动提取文档文本
                    </label>
                    <button id="clear-chat" class="text-xs text-gray-400 hover:text-gray-600">清空对话</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div id="settings-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4 overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
                <h2 class="text-lg font-semibold text-gray-900">设置</h2>
                <button id="close-settings" class="p-1 hover:bg-gray-100 rounded-lg transition">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="p-6 space-y-6">
                <!-- API Key -->
                <div>
                    <label class="settings-label">API Key</label>
                    <input type="password" id="api-key" class="settings-input" placeholder="请输入 API Key">
                    <p class="text-xs text-gray-400 mt-1">您的密钥仅存储在本地</p>
                </div>

                <!-- API URL -->
                <div>
                    <label class="settings-label">API URL</label>
                    <input type="text" id="api-url" class="settings-input" placeholder="https://open.bigmodel.cn/api/paas/v4/chat/completions">
                    <p class="text-xs text-gray-400 mt-1">API 请求地址</p>
                </div>

                <!-- Model Name -->
                <div>
                    <label class="settings-label">模型名称</label>
                    <input type="text" id="model-name" class="settings-input" placeholder="glm-4">
                    <p class="text-xs text-gray-400 mt-1">例如: glm-4, glm-4-flash, glm-4-air 等</p>
                </div>

                <!-- Workspace Path -->
                <div>
                    <label class="settings-label">工作区路径</label>
                    <div class="flex gap-2">
                        <input type="text" id="workspace-path" class="settings-input flex-1" placeholder="/path/to/workspace">
                        <button id="select-workspace-btn" class="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition text-sm text-gray-600">
                            选择
                        </button>
                    </div>
                    <p class="text-xs text-gray-400 mt-1">文档所在的文件夹所在路径</p>
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-50 flex justify-end gap-3">
                <button id="close-settings-btn" class="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-200 rounded-lg transition">
                    取消
                </button>
                <button id="save-settings" class="px-4 py-2 text-sm font-medium text-white bg-blue-500 hover:bg-blue-600 rounded-lg transition">
                    保存
                </button>
            </div>
        </div>
    </div>
</body>
</html>
